services:
  postgres:
    image: postgres:16-alpine
    container_name: procurement_automation_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/16/docker
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: procurement_automation_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  celery:
    build: .
    container_name: procurement_automation_celery
    env_file: .env
    command: celery -A procurement_automation worker -l info
    volumes:
      - ./:/app
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  migrate_accounts:
    build: .
    container_name: procurement_automation_migrate_accounts
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: python manage.py migrate accounts
    networks:
      - app-network
    restart: "no"

  migrate_others:
    build: .
    container_name: procurement_automation_migrate_others
    env_file: .env
    depends_on:
      migrate_accounts:
        condition: service_completed_successfully
    command: python manage.py migrate
    networks:
      - app-network
    restart: "no"


  app:
    build: .
    container_name: procurement_automation
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./models:/app/models
    depends_on:
      migrate_others:
        condition: service_completed_successfully
      celery:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge